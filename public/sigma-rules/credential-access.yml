title: Credential Access on Unpatched System
id: gatra-sigma-007
status: stable
description: >
  Detects credential access or credential dumping activity on systems with a patch status of
  'behind'. Unpatched systems are significantly more susceptible to credential harvesting attacks
  such as LSASS dumping, SAM database access, or RADIUS secret extraction. This rule targets
  critical telco infrastructure where stolen credentials could enable full network takeover.
logsource:
  category: endpoint
  product: auditd
detection:
  credential_action:
    action|contains:
      - credential
      - dump
  unpatched_system:
    host_id|asset_patch_status: behind
  condition: credential_action and unpatched_system
fields:
  - host_id
  - src_ip
  - user
  - action
  - process_name
  - command_line
  - event_type
falsepositives:
  - Authorized penetration testing activities with SOC coordination
  - Password vault agents performing scheduled credential rotation
  - Backup agents accessing credential stores for configuration archiving
level: high
tags:
  - attack.credential_access
  - attack.t1003
  - attack.t1003.001
  - attack.t1552
gatra_agent: credential_theft_agent
mitre_technique: T1003.001
kill_chain_phase: credential-access
recommended_actions:
  - Immediately reset all credentials on the affected system
  - Apply all outstanding patches in an emergency maintenance window
  - Review all privileged access activity for the past 90 days
  - Enable credential guard and audit policies on the system
  - Rotate RADIUS secrets and SNMP community strings if applicable
